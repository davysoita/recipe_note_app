{% extends 'base.html' %}

{% block content %}

<h2>{{ recipe.title }}</h2>

<p><strong>Category:</strong> {{ recipe.category }}</p>

<p><strong>Preparation Time:</strong> {{ recipe.preparation_time }} minutes</p>

<h4>Ingredients</h4>

<p>{{ recipe.ingredients }}</p>

<h4>Instructions</h4>

<p>{{ recipe.instructions }}</p>

<a href="{% url 'recipes' %}" class="btn btn-secondary">
Back
</a>

{% endblock %}
