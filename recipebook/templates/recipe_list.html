{% extends 'base.html' %}
{% block content %}

<h2>All Recipes</h2>
<a href="{% url 'add_recipe' %}" class="btn btn-success mb-3">Add Recipe</a>
<table class="table table-bordered">
    <thead>
        <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Time</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody>
       {% for recipe in recipes %}
       <tr>
        <td>{{ recipe.title }}</td>
        <td>{{ recipe.category }}</td>
        <td>{{ recipe.preparation_time }} mins</td>
        <td>
            <a href="{% url 'recipe_detail' recipe.id %}" class="btn btn-info btn-sm">View</a>
            <a href="{% url 'edit_recipe' recipe.id %}" class="btn btn-warning btn-sm">Edit</a>
            <a href="{% url 'delete_recipe' recipe.id %}" class="btn btn-danger btn-sm">Delete</a>
        </td>
       </tr>
       {% empty %}
       <tr>
            <td colspan="4">No recipes available.</td>
       </tr>
       {% endfor %}
    </tbody>

</table>
{% endblock %}
